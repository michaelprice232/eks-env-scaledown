# E2E pipeline. Runs the Terratest end-to-end suite (test/e2e) against a real, local kind cluster.
#
# Unlike the default CI workflow (which runs on every branch push), this only runs on pull requests
# targeting main: the suite is slow and provisions throwaway clusters, so it gates merges into main
# rather than running on every push. The default CI workflow (tests, linters, image build) still runs
# in parallel on the same push.
name: E2E

on:
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Clone git repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Use the Go version from the e2e module's go.mod. Docker (used to build the app image) and a
      # container runtime are already present on the GitHub-hosted runner.
      - name: setup-go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/e2e/go.mod

      # terraform_wrapper must be off so Terratest can read raw `terraform output` values.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false

      # The Terraform provider embeds kind for cluster creation, but the tests use the kind CLI to load
      # the locally-built image into the node, so the binary must be on PATH.
      - name: Install kind
        env:
          # https://github.com/kubernetes-sigs/kind
          KIND_VERSION: "v0.32.0"
        run: |
          curl -fsSLo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Run end-to-end tests
        run: make test-e2e
