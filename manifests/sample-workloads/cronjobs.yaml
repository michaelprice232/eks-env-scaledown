apiVersion: batch/v1
kind: CronJob
metadata:
  name: active-cronjob
spec:
  schedule: "0 0 * * *"  # Runs daily at midnight
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: hello
              image: busybox:1.38
              args:
                - /bin/sh
                - -c
                - echo "Hello from active cronjob"
          restartPolicy: OnFailure
  suspend: false
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: suspended-cronjob
spec:
  schedule: "0 0 * * *"  # Also scheduled daily at midnight
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: hello
              image: busybox:1.38
              args:
                - /bin/sh
                - -c
                - echo "Hello from suspended cronjob"
          restartPolicy: OnFailure
  suspend: true
